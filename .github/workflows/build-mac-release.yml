name: Build Mac Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    name: Build Mac Release
    runs-on: macos-15
    permissions:
      contents: write

    env:
      FETCHCONTENT_CACHE_VERSION: 1
      FETCHCONTENT_CACHE_DIR: ${{ github.workspace }}/build/_deps

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        id: cache-fetchcontent
        with:
          key: fetchcontent-v${{ env.FETCHCONTENT_CACHE_VERSION }}-macos-${{ hashFiles('cmake/FindDependencies.cmake', 'src/thirdparty/CMakeLists.txt') }}
          restore-keys: fetchcontent-v${{ env.FETCHCONTENT_CACHE_VERSION }}-macos-
          path: ${{ env.FETCHCONTENT_CACHE_DIR }}

      - name: Install dependencies
        run: |
          brew install \
            cmake \
            ninja \
            boost \
            eigen \
            openimageio \
            curl \
            metis \
            glog \
            googletest \
            ceres-solver \
            qt \
            glew \
            cgal \
            sqlite3 \
            libomp
          brew link --force libomp

      - name: Configure and build
        run: |
          export PATH="$(brew --prefix qt)/bin:$PATH"
          mkdir -p build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTESTS_ENABLED=OFF \
            -DWERROR_ENABLED=OFF \
            -DQt6_DIR="$(brew --prefix qt)/lib/cmake/Qt6" \
            -DFETCHCONTENT_FULLY_DISCONNECTED=${{ steps.cache-fetchcontent.outputs.cache-hit == 'true' && 'ON' || 'OFF' }}
          ninja

      - name: Package Mac App
        run: |
          cd build
          # The script expects the path to the executable
          ../scripts/shell/build_mac_app.sh src/colmap/exe/colmap

      - name: Upload Release (Rolling Latest)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest Automated Build
          prerelease: true
          files: build/COLMAP-mac.zip

      - name: Upload Release (Tagged)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/COLMAP-mac.zip
