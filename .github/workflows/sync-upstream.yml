name: Sync Upstream

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync from Upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          # Use a Personal Access Token (PAT) so that pushes trigger other workflows
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: colmap/colmap
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.PAT_TOKEN }}
          # Automatically test for changes and push them
          test_mode: false

      - name: Report Status
        if: steps.sync.outputs.has_new_commits == 'true'
        run: echo "New commits were successfully synced."
